paths:
  uploads: uploads
  static: ""

collections_config:
  pages:
    path: ""
    icon: wysiwyg
    disable_url: false

    # ★ここが重要：既定で Visual を開く
    _default_editor: visual

    # ★Visual/Source/Content を有効化（Data で開く事故を防ぐ）
    _enabled_editors:
      - visual
      - content
      - source

    disable_add: false
    disable_add_folder: false
    disable_file_actions: false

    preview:
      text:
      subtext:
      icon:
      icon_color:
      icon_background_color:
      image:
      metadata:
      gallery:

timezone: Asia/Tokyo

markdown:
  engine: commonmark
  options:
    xhtml: false
    breaks: false
    linkify: false
    typographer: false
    spaced_lists: false
    sentence_per_line: false
    gfm: false
    code_block_fences: "```"
    escape_snippets_in_code_blocks: false
    treat_indentation_as_code: false
    table: false
    strikethrough: false
    subscript: false
    superscript: false
    heading_ids: false
    attributes: false
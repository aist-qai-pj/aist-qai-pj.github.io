	<svg width="0" height="0" aria-hidden="true" focusable="false" style="position:absolute">
  <filter id="wobble" x="-20%" y="-20%" width="140%" height="140%">
    <feTurbulence type="fractalNoise" baseFrequency="0.010" numOctaves="2" seed="2" result="noise">
      <animate attributeName="baseFrequency" dur="8s"
               values="0.008;0.012;0.009" repeatCount="indefinite"></animate>
      <animate attributeName="seed" dur="7s"
               values="1;2;3;2;1" repeatCount="indefinite"></animate>
    </feTurbulence>

    <feDisplacementMap in="SourceGraphic" in2="noise" scale="30"
                       xChannelSelector="R" yChannelSelector="G">
      <animate attributeName="scale" dur="7s"
               values="18;30;20" repeatCount="indefinite"></animate>
    </feDisplacementMap>
  </filter>
</svg>

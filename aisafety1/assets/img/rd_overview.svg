<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720" role="img" aria-labelledby="t d">
  <title id="t">研究開発成果（全体像）</title>
  <desc id="d">評価・実証・標準化を一体で推進する全体像を、3つのカード（青・緑・紫）と成果物で示す図。</desc>

  <defs>
    <style>
      .ink{ fill: rgba(11,18,32,.92); font-family: -apple-system,BlinkMacSystemFont,"Segoe UI","Noto Sans JP",sans-serif;}
      .muted{ fill: rgba(11,18,32,.66); }
      .line{ stroke: rgba(11,18,32,.10); }
      .pill{ fill: rgba(255,255,255,.66); stroke: rgba(11,18,32,.10); }
      .h1{ font-size: 26px; font-weight: 900; letter-spacing: -0.02em; }
      .h2{ font-size: 14px; font-weight: 900; letter-spacing: 0.02em; }
      .p{ font-size: 13px; font-weight: 650; }
      .s{ font-size: 12px; font-weight: 600; }
      .chip{ fill: rgba(255,255,255,.70); stroke: rgba(11,18,32,.10); }
      .chipTxt{ font-size: 12px; font-weight: 750; fill: rgba(11,18,32,.78); }
    </style>

    <radialGradient id="bg1" cx="18%" cy="22%" r="75%">
      <stop offset="0" stop-color="rgba(43,179,255,.20)"/>
      <stop offset="1" stop-color="rgba(255,255,255,0)"/>
    </radialGradient>
    <radialGradient id="bg2" cx="55%" cy="18%" r="75%">
      <stop offset="0" stop-color="rgba(57,215,179,.16)"/>
      <stop offset="1" stop-color="rgba(255,255,255,0)"/>
    </radialGradient>
    <radialGradient id="bg3" cx="86%" cy="24%" r="80%">
      <stop offset="0" stop-color="rgba(183,132,255,.16)"/>
      <stop offset="1" stop-color="rgba(255,255,255,0)"/>
    </radialGradient>

    <linearGradient id="paper" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="rgba(255,255,255,.78)"/>
      <stop offset="1" stop-color="rgba(255,255,255,.52)"/>
    </linearGradient>

    <linearGradient id="bBlue" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="rgba(79,125,255,.18)"/>
      <stop offset="0.6" stop-color="rgba(79,125,255,.06)"/>
      <stop offset="1" stop-color="rgba(255,255,255,0)"/>
    </linearGradient>
    <linearGradient id="bGreen" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="rgba(34,197,143,.16)"/>
      <stop offset="0.6" stop-color="rgba(34,197,143,.05)"/>
      <stop offset="1" stop-color="rgba(255,255,255,0)"/>
    </linearGradient>
    <linearGradient id="bPurple" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="rgba(183,132,255,.18)"/>
      <stop offset="0.6" stop-color="rgba(183,132,255,.06)"/>
      <stop offset="1" stop-color="rgba(255,255,255,0)"/>
    </linearGradient>

    <filter id="shadow" x="-20%" y="-20%" width="140%" height="160%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="rgba(11,18,32,.10)"/>
    </filter>

    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="rgba(11,18,32,.42)"/>
    </marker>
  </defs>

  <!-- soft bg -->
  <rect x="-80" y="-80" width="1360" height="880" fill="url(#bg1)"/>
  <rect x="-80" y="-80" width="1360" height="880" fill="url(#bg2)"/>
  <rect x="-80" y="-80" width="1360" height="880" fill="url(#bg3)"/>

  <!-- canvas -->
  <g filter="url(#shadow)">
    <rect x="56" y="56" width="1088" height="608" rx="26" fill="url(#paper)" stroke="rgba(11,18,32,.10)"/>
  </g>

  <!-- header -->
  <text x="92" y="118" class="ink h1">研究開発成果（全体像）</text>
  <text x="92" y="144" class="muted s">評価・実証・標準化を一体で推進し、社会実装へつなぐ</text>

  <!-- flow (simple, readable) -->
  <g>
    <rect x="92" y="172" width="1016" height="62" rx="16" fill="rgba(255,255,255,.58)" stroke="rgba(11,18,32,.10)"/>
    <text x="118" y="210" class="ink p">Input（課題/要求/国際動向）</text>
    <line x1="395" y1="203" x2="520" y2="203" stroke="rgba(11,18,32,.32)" stroke-width="2" marker-end="url(#arrow)"/>
    <text x="540" y="210" class="ink p">Activities（①②③）</text>
    <line x1="785" y1="203" x2="910" y2="203" stroke="rgba(11,18,32,.32)" stroke-width="2" marker-end="url(#arrow)"/>
    <text x="930" y="210" class="ink p">Outputs（成果/普及）</text>
  </g>

  <!-- common layer -->
  <g>
    <text x="92" y="268" class="ink h2">共通レイヤ（横断）</text>
    <rect x="92" y="282" width="1016" height="78" rx="18" fill="rgba(255,255,255,.58)" stroke="rgba(11,18,32,.10)"/>
    <text x="112" y="316" class="ink p">国際連携・標準化・社会実装を通じて、成果を普及</text>
    <text x="112" y="342" class="muted s">例：ISO/IEC等への貢献／企業向け実装解説／コミュニティ運営（AISI連携 等）</text>
  </g>

  <!-- cards row -->
  <!-- card 1 blue -->
  <g>
    <rect x="92" y="386" width="332" height="208" rx="22" fill="rgba(255,255,255,.62)" stroke="rgba(11,18,32,.10)"/>
    <rect x="92" y="386" width="332" height="208" rx="22" fill="url(#bBlue)"/>

    <rect x="114" y="406" width="288" height="40" rx="999" class="pill"/>
    <circle cx="140" cy="426" r="14" fill="rgba(79,125,255,.16)" stroke="rgba(79,125,255,.35)"/>
    <text x="140" y="431" class="ink p" text-anchor="middle">1</text>
    <text x="265" y="432" class="ink p" text-anchor="middle">AIセーフティ評価・管理基盤技術（10実証）</text>

    <text x="114" y="476" class="ink p">評価・管理の基盤を整備し、実証を支える</text>

    <g transform="translate(114,492)">
      <circle cx="6" cy="6" r="2" fill="rgba(11,18,32,.42)"/>
      <text x="16" y="10" class="muted s">評価観点・評価水準</text>
      <circle cx="6" cy="28" r="2" fill="rgba(11,18,32,.42)"/>
      <text x="16" y="32" class="muted s">評価ツール／ベンチマーク要件</text>
      <circle cx="6" cy="50" r="2" fill="rgba(11,18,32,.42)"/>
      <text x="16" y="54" class="muted s">試験的セーフティ評価</text>
    </g>
  </g>

  <!-- card 2 green -->
  <g>
    <rect x="434" y="386" width="332" height="208" rx="22" fill="rgba(255,255,255,.62)" stroke="rgba(11,18,32,.10)"/>
    <rect x="434" y="386" width="332" height="208" rx="22" fill="url(#bGreen)"/>

    <rect x="456" y="406" width="288" height="40" rx="999" class="pill"/>
    <circle cx="482" cy="426" r="14" fill="rgba(34,197,143,.16)" stroke="rgba(34,197,143,.35)"/>
    <text x="482" y="431" class="ink p" text-anchor="middle">2</text>
    <text x="607" y="432" class="ink p" text-anchor="middle">「暮らし」領域（6実証）</text>

    <text x="456" y="476" class="ink p">生活空間での評価・実装技術を確立</text>

    <g transform="translate(456,492)">
      <circle cx="6" cy="6" r="2" fill="rgba(11,18,32,.42)"/>
      <text x="16" y="10" class="muted s">評価シナリオ</text>
      <circle cx="6" cy="28" r="2" fill="rgba(11,18,32,.42)"/>
      <text x="16" y="32" class="muted s">ベンチマークデータセット</text>
      <circle cx="6" cy="50" r="2" fill="rgba(11,18,32,.42)"/>
      <text x="16" y="54" class="muted s">評価手法／テスト環境構築</text>
    </g>
  </g>

  <!-- card 3 purple -->
  <g>
    <rect x="776" y="386" width="332" height="208" rx="22" fill="rgba(255,255,255,.62)" stroke="rgba(11,18,32,.10)"/>
    <rect x="776" y="386" width="332" height="208" rx="22" fill="url(#bPurple)"/>

    <rect x="798" y="406" width="288" height="40" rx="999" class="pill"/>
    <circle cx="824" cy="426" r="14" fill="rgba(183,132,255,.16)" stroke="rgba(183,132,255,.35)"/>
    <text x="824" y="431" class="ink p" text-anchor="middle">3</text>
    <text x="942" y="432" class="ink p" text-anchor="middle">生成AI向け 品質マネジメント手法（ガイドライン・普及）</text>

    <text x="798" y="476" class="ink p">基準策定と企業実装の解説を整備</text>

    <g transform="translate(798,492)">
      <circle cx="6" cy="6" r="2" fill="rgba(11,18,32,.42)"/>
      <text x="16" y="10" class="muted s">ガイドライン策定／公開・改訂</text>
      <circle cx="6" cy="28" r="2" fill="rgba(11,18,32,.42)"/>
      <text x="16" y="32" class="muted s">企業向け実装解説（運用・管理含む）</text>
      <circle cx="6" cy="50" r="2" fill="rgba(11,18,32,.42)"/>
      <text x="16" y="54" class="muted s">ISO/IEC等の議論への貢献</text>
    </g>
  </g>

  <!-- outputs chips -->
  <g>
    <text x="92" y="636" class="ink h2">成果物（Outputs）</text>

    <g transform="translate(92,650)">
      <rect class="chip" x="0" y="0" rx="999" ry="999" width="120" height="30"/>
      <text class="chipTxt" x="60" y="20" text-anchor="middle">評価手法</text>

      <rect class="chip" x="132" y="0" rx="999" ry="999" width="170" height="30"/>
      <text class="chipTxt" x="217" y="20" text-anchor="middle">ベンチマーク/データ</text>

      <rect class="chip" x="314" y="0" rx="999" ry="999" width="90" height="30"/>
      <text class="chipTxt" x="359" y="20" text-anchor="middle">実証</text>

      <rect class="chip" x="416" y="0" rx="999" ry="999" width="140" height="30"/>
      <text class="chipTxt" x="486" y="20" text-anchor="middle">ガイドライン</text>

      <rect class="chip" x="568" y="0" rx="999" ry="999" width="120" height="30"/>
      <text class="chipTxt" x="628" y="20" text-anchor="middle">実装解説</text>

      <rect class="chip" x="700" y="0" rx="999" ry="999" width="110" height="30"/>
      <text class="chipTxt" x="755" y="20" text-anchor="middle">標準化</text>

      <rect class="chip" x="822" y="0" rx="999" ry="999" width="170" height="30"/>
      <text class="chipTxt" x="907" y="20" text-anchor="middle">コミュニティ運営</text>
    </g>
  </g>
</svg>
